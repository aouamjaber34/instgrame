for (const user of usernames) {
  const ref = doc(db, "visited", user);
  const snap = await getDoc(ref);

  const a = document.createElement("a");
  a.href = "https://instagram.com/" + user;
  a.target = "_blank";
  a.className = "row";
  a.innerText = "@" + user;

  if (snap.exists()) {
    a.classList.add("visited");
    visitedCount++;
  }

  a.onclick = async () => {
    await setDoc(ref, { visited: true });
    if (!a.classList.contains("visited")) {
      a.classList.add("visited");
      visitedCount++;
      counter.innerText = visitedCount;
    }
  };

  list.appendChild(a);
}

counter.innerText = visitedCount;
